<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestiune Insigne - Profesor</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/insigne.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <nav id="navbar-container"></nav>

    <main class="main-content">
        <div class="page-actions">
            <div>
                <h1>Gestiune Insigne</h1>
                <p>Definește regulile și recompensele pentru studenți.</p>
            </div>
            <button class="btn-primary" id="btn-open-modal">
                <i class="fa-solid fa-plus"></i> Creează Insignă Nouă
            </button>
        </div>

        <div class="badges-grid" id="prof-badges-grid">
            
            <div class="badge-card obtained">
                <div class="delete-btn"><i class="fa-solid fa-trash"></i></div>
                <div class="badge-icon">
                    <i class="fa-brands fa-html5"></i>
                </div>
                <h4>HTML Basic</h4>
                <p class="badge-desc">Se acordă automat la finalizarea Modulului 1.</p>
                <span class="badge-status">Automat</span>
            </div>

            <div class="badge-card obtained">
                <div class="delete-btn"><i class="fa-solid fa-trash"></i></div>
                <div class="badge-icon">
                    <i class="fa-solid fa-users"></i>
                </div>
                <h4>Spirit de Echipă</h4>
                <p class="badge-desc">Pe baza nominalizărilor colegilor.</p>
                <span class="badge-status">Manual</span>
            </div>

            <div class="badge-card obtained">
                <div class="delete-btn"><i class="fa-solid fa-trash"></i></div>
                <div class="badge-icon">
                    <i class="fa-solid fa-clock"></i>
                </div>
                <h4>Punctualitate</h4>
                <p class="badge-desc">Pentru predarea a 3 teme consecutive la timp.</p>
                <span class="badge-status">Automat</span>
            </div>

        </div>
    </main>

    <div id="create-badge-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Configurare Insignă Nouă</h3>
                <button id="close-modal"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <form id="create-badge-form">
                <div class="form-row">
                    <label>Nume Insignă</label>
                    <input type="text" id="badge-name" placeholder="Ex: Expert Java" required>
                </div>

                <div class="form-row">
                    <label>Iconiță</label>
                    <div class="icon-selector-wrapper">
                        <select id="badge-icon-select">
                            <option value="fa-trophy">Trofeu</option>
                            <option value="fa-star">Stea</option>
                            <option value="fa-medal">Medalie</option>
                            <option value="fa-code">Cod</option>
                            <option value="fa-brain">Brain</option>
                            <option value="fa-rocket">Rachetă</option>
                        </select>
                        <div class="preview-icon"><i class="fa-solid fa-trophy" id="icon-preview"></i></div>
                    </div>
                </div>

                <div class="form-row">
                    <label>Tip Acordare</label>
                    <select id="badge-type">
                        <option value="Automat">Automat (bazat pe reguli)</option>
                        <option value="Manual">Manual (acordat de profesor)</option>
                    </select>
                </div>

                <div class="form-row">
                    <label>Descriere / Criterii</label>
                    <textarea id="badge-desc" rows="3" placeholder="Descrie condițiile de acordare..." required></textarea>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%;">Salvează Insigna</button>
            </form>
        </div>
    </div>

    <script src="../js/navbar-profesor.js"></script>
    <script src="../js/insigne-profesor.js"></script>
</body>
</html>
